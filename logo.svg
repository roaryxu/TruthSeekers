<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92FE9D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="300" height="120" fill="transparent"/>
  
  <!-- Magnifying glass / Scales hybrid -->
  <circle cx="150" cy="45" r="28" fill="none" stroke="url(#grad)" stroke-width="6" filter="url(#glow)"/>
  <path d="M168 65 L190 85" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Balance scale elements inside the lens -->
  <path d="M150 25 L150 60" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <path d="M135 35 L165 35" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <polygon points="135,35 130,50 140,50" fill="#ffffff" opacity="0.8"/>
  <polygon points="165,35 160,50 170,50" fill="#ffffff" opacity="0.8"/>
  
  <text x="150" y="110" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4" opacity="0.9">TRUTH SEEKERS</text>
</svg>